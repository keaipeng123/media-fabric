# 模拟上级平台：监听 127.0.0.1:5061，接受模拟下级注册。
[node]
sip_id = 10000000002000000001
sip_ip = 127.0.0.1
sip_port = 5061
sip_realm = 1000000000
sip_usr = admin
sip_pwd = admin
rtp_port_begin = 30000
rtp_port_end = 35000

[peer.downstream.1]
# 与 media-fabric-sub.conf 的 [node] 保持一致。
sip_id = 12000000002000000001
remote_ip = 127.0.0.1
remote_port = 7101
allow_register = true
sip_realm = 1000000000
sip_usr = admin
sip_pwd = admin

[media]
stream_file = SipSubService/conf/stream.file
rtp_payload_bytes = 1300
rtp_timestamp_increment = 3600
stream_send_interval_ms = 1000
stream_loop = true

[timers]
heartbeat_interval_seconds = 60
register_refresh_seconds = 300

[management]
socket_path = /tmp/media-fabric-sup.sock
