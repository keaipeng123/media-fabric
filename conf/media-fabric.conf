[node]
sip_id = 11000000002000000001
sip_ip = 127.0.0.1
sip_port = 7101
sip_realm = 1000000000
sip_usr = admin
sip_pwd = admin
rtp_port_begin = 30000
rtp_port_end = 40000

[peer.upstream.1]
sip_id = 10000000002000000001
remote_ip = 127.0.0.1
remote_port = 5061
register_to = true
expires = 300
sip_realm = 1000000000
sip_usr = admin
sip_pwd = admin

[peer.downstream.1]
sip_id = 12000000002000000001
allow_register = true

[localserver]
local_ip = 0.0.0.0
local_port = 11300

[media]
stream_file = SipSubService/conf/stream.file
catalog_file = SipSubService/conf/catalog.json
rtp_payload_bytes = 1300
rtp_timestamp_increment = 3600
stream_send_interval_ms = 1000
stream_loop = true

[timers]
heartbeat_interval_seconds = 60
register_refresh_seconds = 300

[management]
socket_path = /tmp/media-fabric.sock

# Go 业务 API。启用前请配置 PostgreSQL 与至少 32 位的 JWT 密钥；
# 首次启动会创建 bootstrap_admin_username 指定的管理员。
[api]
enabled = false
listen_address = 127.0.0.1:8080
database_url = postgres://media_fabric:change-me@127.0.0.1:5432/media_fabric?sslmode=disable
jwt_secret = replace-this-with-a-random-secret-at-least-32-characters
bootstrap_admin_username = admin
bootstrap_admin_password = change-this-before-enabling-api
access_token_ttl_minutes = 15
refresh_token_ttl_minutes = 10080
