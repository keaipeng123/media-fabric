# 模拟下级设备：监听 127.0.0.1:7101，并注册到模拟上级。
[node]
sip_id = 12000000002000000001
sip_ip = 127.0.0.1
sip_port = 7101
sip_realm = 1000000000
sip_usr = admin
sip_pwd = admin
rtp_port_begin = 35002
rtp_port_end = 40000

[peer.upstream.1]
# 与 media-fabric-sup.conf 的 [node] 保持一致。
sip_id = 10000000002000000001
remote_ip = 127.0.0.1
remote_port = 5061
register_to = true
expires = 300
sip_realm = 1000000000
sip_usr = admin
sip_pwd = admin

[media]
stream_file = SipSubService/conf/stream.file
catalog_file = SipSubService/conf/catalog.json
rtp_payload_bytes = 1300
rtp_timestamp_increment = 3600
stream_send_interval_ms = 1000
stream_loop = true

[timers]
heartbeat_interval_seconds = 60
register_refresh_seconds = 300

[management]
socket_path = /tmp/media-fabric-sub.sock
